<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background with rounded corners -->
  <rect width="512" height="512" rx="112" fill="#0a0a0f"/>
  <!-- Red F with glow effect (matching FOMO logo style) -->
  <text x="256" y="390" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="380" fill="#e81717" filter="url(#glow)" letter-spacing="-10">F</text>
</svg>
