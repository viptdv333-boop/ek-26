<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0a0a0f"/>
  <g transform="translate(130, 50)">
    <!-- F vertical bar (candle body) -->
