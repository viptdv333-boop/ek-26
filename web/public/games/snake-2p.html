<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Battle — Online</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0f23; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff; touch-action: none; }
body { display: flex; flex-direction: column; align-items: center; justify-content: center; }

.header { text-align: center; padding: 8px; }
.header h1 { font-size: 16px; font-weight: 700; background: linear-gradient(90deg, #22d3ee, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.scores { display: flex; gap: 24px; justify-content: center; margin-top: 4px; font-size: 13px; }
.scores .p1 { color: #22d3ee; }
.scores .p2 { color: #a78bfa; }
.role-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 4px; }
.role-host { background: rgba(34,211,238,0.2); color: #22d3ee; }
.role-guest { background: rgba(167,139,250,0.2); color: #a78bfa; }

canvas { border-radius: 8px; display: block; background: #1a1a2e; }

.controls { display: none; padding: 8px 16px; width: 100%; }
.pad { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.pad button { width: 56px; height: 56px; border: none; border-radius: 12px; font-size: 22px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); color: #fff; }
.pad .row { display: flex; gap: 2px; }
.pad button:active { opacity: 0.6; transform: scale(0.92); }

.overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(15,15,35,0.9); z-index: 10; }
.overlay h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.overlay .sub { font-size: 14px; color: #888; margin-bottom: 16px; text-align: center; padding: 0 20px; }
.overlay button { padding: 12px 32px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #22d3ee, #a78bfa); color: #fff; }
.overlay button:active { transform: scale(0.95); }
.waiting { color: #a78bfa; font-size: 14px; }
.waiting .dots::after { content: ''; animation: dots 1.5s infinite; }
@keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }

.hidden { display: none !important; }

@media (max-width: 600px) { .controls { display: flex; justify-content: center; } }
</style>
</head>
<body>

<div class="header">
  <h1>Snake Battle</h1>
  <div class="scores">
    <span class="p1">P1: <span id="s1">0</span> <span class="role-tag role-host" id="roleTag1"></span></span>
    <span class="p2">P2: <span id="s2">0</span> <span class="role-tag role-guest" id="roleTag2"></span></span>
  </div>
</div>

<div style="position: relative; display: inline-block;">
  <canvas id="c"></canvas>
  <div class="overlay" id="waitScreen">
    <h2>Snake Battle</h2>
    <div class="sub" id="waitMsg">Ожидание второго игрока<span class="dots"></span></div>
  </div>
  <div class="overlay hidden" id="endScreen">
    <h2 id="endTitle">Game Over</h2>
    <div class="sub" id="endWinner"></div>
    <button onclick="requestRestart()">Ещё раз</button>
  </div>
</div>

<div class="controls" id="mobileControls">
  <div class="pad">
    <button ontouchstart="sendDir(0,-1)" onclick="sendDir(0,-1)">&uarr;</button>
    <div class="row">
      <button ontouchstart="sendDir(-1,0)" onclick="sendDir(-1,0)">&larr;</button>
      <button ontouchstart="sendDir(0,1)" onclick="sendDir(0,1)">&darr;</button>
      <button ontouchstart="sendDir(1,0)" onclick="sendDir(1,0)">&rarr;</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const COLS = 20, ROWS = 20;
let CELL;

// Game state
let isHost = false;
let gameRunning = false;
let snake1, snake2, food, dir1, dir2, score1, score2, tickTimer;

// Resize
function resize() {
  const maxW = Math.min(window.innerWidth - 16, 420);
  const maxH = window.innerHeight - 160;
  const size = Math.min(maxW, maxH);
  CELL = Math.floor(size / COLS);
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
  if (gameRunning) draw();
}
resize();
window.addEventListener('resize', resize);

// Communication with parent (messenger)
function sendToParent(type, payload) {
  window.parent.postMessage({ source: 'snake-game', type, ...payload }, '*');
}

window.addEventListener('message', (e) => {
  if (!e.data || e.data.source !== 'snake-host') return;
  const msg = e.data;

  switch (msg.type) {
    case 'role':
      isHost = msg.isHost;
      document.getElementById('roleTag1').textContent = isHost ? 'Вы' : '';
      document.getElementById('roleTag2').textContent = isHost ? '' : 'Вы';
      if (isHost) {
        document.getElementById('waitMsg').textContent = 'Ожидание второго игрока...';
      } else {
        document.getElementById('waitMsg').textContent = 'Подключение...';
      }
      break;

    case 'start':
      startGame(msg.state);
      break;

    case 'state':
      applyState(msg.state);
      break;

    case 'opponent-move':
      if (isHost) {
        // Host receives opponent's direction
        const d = msg.dir;
        if (dir2.x !== -d.x || dir2.y !== -d.y) dir2 = d;
      }
      break;

    case 'game-over':
      endGame(msg.winner);
      break;
  }
});

function sendDir(dx, dy) {
  if (!gameRunning) return;
  if (isHost) {
    if (dir1.x !== -dx || dir1.y !== -dy) dir1 = {x:dx, y:dy};
  } else {
    // Guest sends move to host via parent
    sendToParent('move', { dir: {x:dx, y:dy} });
  }
}

// Keyboard
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'w': case 'W': case 'ArrowUp': sendDir(0,-1); e.preventDefault(); break;
    case 's': case 'S': case 'ArrowDown': sendDir(0,1); e.preventDefault(); break;
    case 'a': case 'A': case 'ArrowLeft': sendDir(-1,0); e.preventDefault(); break;
    case 'd': case 'D': case 'ArrowRight': sendDir(1,0); e.preventDefault(); break;
  }
});

function startGame(state) {
  document.getElementById('waitScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  applyState(state);
  gameRunning = true;

  if (isHost) {
    // Host runs game loop
    if (tickTimer) clearInterval(tickTimer);
    tickTimer = setInterval(hostTick, 140);
  }
}

function applyState(state) {
  snake1 = state.snake1;
  snake2 = state.snake2;
  food = state.food;
  score1 = state.score1;
  score2 = state.score2;
  dir1 = state.dir1 || dir1 || {x:1,y:0};
  dir2 = state.dir2 || dir2 || {x:-1,y:0};
  document.getElementById('s1').textContent = score1;
  document.getElementById('s2').textContent = score2;
  draw();
}

function getState() {
  return { snake1, snake2, food, dir1, dir2, score1, score2 };
}

function hostTick() {
  if (!gameRunning) return;

  const h1 = {x: snake1[0].x + dir1.x, y: snake1[0].y + dir1.y};
  const h2 = {x: snake2[0].x + dir2.x, y: snake2[0].y + dir2.y};

  const wall1 = h1.x < 0 || h1.x >= COLS || h1.y < 0 || h1.y >= ROWS;
  const wall2 = h2.x < 0 || h2.x >= COLS || h2.y < 0 || h2.y >= ROWS;

  const allBody = new Set();
  snake1.forEach(s => allBody.add(s.x+','+s.y));
  snake2.forEach(s => allBody.add(s.x+','+s.y));
  const body1 = allBody.has(h1.x+','+h1.y);
  const body2 = allBody.has(h2.x+','+h2.y);
  const headCollision = h1.x === h2.x && h1.y === h2.y;

  const dead1 = wall1 || body1 || headCollision;
  const dead2 = wall2 || body2 || headCollision;

  if (dead1 || dead2) {
    gameRunning = false;
    clearInterval(tickTimer);
    let winner = dead1 && dead2 ? 'draw' : dead1 ? 'p2' : 'p1';
    sendToParent('game-over', { winner, state: getState() });
    endGame(winner);
    return;
  }

  snake1.unshift(h1);
  snake2.unshift(h2);

  let ate = false;
  if (h1.x === food.x && h1.y === food.y) { score1++; ate = true; }
  else snake1.pop();
  if (h2.x === food.x && h2.y === food.y) { score2++; ate = true; }
  else snake2.pop();

  if (ate) placeFood();

  const state = getState();
  sendToParent('state', { state });
  document.getElementById('s1').textContent = score1;
  document.getElementById('s2').textContent = score2;
  draw();
}

function placeFood() {
  const occupied = new Set();
  [...snake1, ...snake2].forEach(s => occupied.add(s.x+','+s.y));
  let x, y;
  do { x = Math.floor(Math.random()*COLS); y = Math.floor(Math.random()*ROWS); }
  while (occupied.has(x+','+y));
  food = {x, y};
}

function endGame(winner) {
  gameRunning = false;
  if (tickTimer) clearInterval(tickTimer);
  const screen = document.getElementById('endScreen');
  const title = document.getElementById('endTitle');
  const winnerEl = document.getElementById('endWinner');
  title.textContent = 'Game Over';
  if (winner === 'draw') { winnerEl.textContent = 'Ничья!'; winnerEl.style.color = '#888'; }
  else if (winner === 'p1') { winnerEl.textContent = isHost ? 'Вы победили!' : 'Противник победил!'; winnerEl.style.color = '#22d3ee'; }
  else { winnerEl.textContent = isHost ? 'Противник победил!' : 'Вы победили!'; winnerEl.style.color = '#a78bfa'; }
  screen.classList.remove('hidden');
}

function requestRestart() {
  sendToParent('restart', {});
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('waitScreen').classList.remove('hidden');
  document.getElementById('waitMsg').textContent = 'Ожидание...';
}

// Drawing
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  for (let i = 0; i <= COLS; i++) { ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, ROWS*CELL); ctx.stroke(); }
  for (let i = 0; i <= ROWS; i++) { ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(COLS*CELL, i*CELL); ctx.stroke(); }

  // Food
  if (food) {
    const pulse = 0.8 + 0.2 * Math.sin(Date.now() / 200);
    ctx.fillStyle = `rgba(239,68,68,${pulse})`;
    ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Snake 1 — cyan
  if (snake1) snake1.forEach((s, i) => {
    ctx.fillStyle = `rgba(34,211,238,${1 - i/snake1.length*0.5})`;
    rr(ctx, s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, i===0 ? CELL/4 : CELL/6);
  });

  // Snake 2 — purple
  if (snake2) snake2.forEach((s, i) => {
    ctx.fillStyle = `rgba(167,139,250,${1 - i/snake2.length*0.5})`;
    rr(ctx, s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, i===0 ? CELL/4 : CELL/6);
  });

  // Eyes
  if (snake1 && dir1) drawEyes(snake1[0], dir1, '#0e7490');
  if (snake2 && dir2) drawEyes(snake2[0], dir2, '#6d28d9');
}

function drawEyes(head, dir, color) {
  if (!head) return;
  ctx.fillStyle = '#fff';
  const cx = head.x*CELL + CELL/2, cy = head.y*CELL + CELL/2;
  const off = CELL*0.18, r = CELL*0.1;
  let e1x,e1y,e2x,e2y;
  if (dir.x===1){e1x=cx+off;e1y=cy-off;e2x=cx+off;e2y=cy+off;}
  else if(dir.x===-1){e1x=cx-off;e1y=cy-off;e2x=cx-off;e2y=cy+off;}
  else if(dir.y===-1){e1x=cx-off;e1y=cy-off;e2x=cx+off;e2y=cy-off;}
  else{e1x=cx-off;e1y=cy+off;e2x=cx+off;e2y=cy+off;}
  ctx.beginPath();ctx.arc(e1x,e1y,r,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(e2x,e2y,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=color;
  ctx.beginPath();ctx.arc(e1x+dir.x*1.5,e1y+dir.y*1.5,r*0.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(e2x+dir.x*1.5,e2y+dir.y*1.5,r*0.5,0,Math.PI*2);ctx.fill();
}

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.fill();}

// Tell parent we're ready
sendToParent('ready', {});
</script>
</body>
</html>
